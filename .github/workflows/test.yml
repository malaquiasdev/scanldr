name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test, typecheck, lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install

      - name: Run gates
        run: |
          bun test
          bun run typecheck
          bun run check
